<form method="post" action="{{ submit_url }}" class="space-y-6">
    {% csrf_token %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium mb-2" for="id_full_name">Name</label>
            {{ form.full_name }}
        </div>
        <div>
            <label class="block text-sm font-medium mb-2" for="id_email">Email</label>
            {{ form.email }}
        </div>
        <div>
            <label class="block text-sm font-medium mb-2" for="id_phone">Phone</label>
            {{ form.phone }}
        </div>
        <div>
            <label class="block text-sm font-medium mb-2" for="id_company">Company</label>
            {{ form.company }}
        </div>
    </div>
    <div>
        <label class="block text-sm font-medium mb-2" for="id_service">Service</label>
        {{ form.service }}
    </div>
    <div>
        <label class="block text-sm font-medium mb-2" for="id_message">Message</label>
        {{ form.message }}
    </div>
    <button type="submit" class="px-8 py-3 bg-black text-white rounded font-semibold hover:bg-gray-800 transition-colors">Send Request</button>
</form>
