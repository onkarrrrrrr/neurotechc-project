{% extends 'base.html' %}
{% load cms_tags static site_extras %}

{% block content %}
<section class="relative min-h-[90vh] flex items-center overflow-hidden bg-black text-white">
    <div class="absolute inset-0 bg-gradient-to-r from-black via-black/70 to-black/20"></div>
    <div class="container mx-auto px-6 max-w-7xl relative z-10 py-24">
        <div class="max-w-4xl" data-aos="fade-right">
            <div class="inline-flex items-center gap-3 px-4 py-1.5 rounded-full border border-white/20 bg-white/10 backdrop-blur-md text-white shadow-sm font-mono text-xs tracking-wider mb-8 uppercase">
                <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
                Editable CMS homepage
            </div>
            <div class="prose prose-invert max-w-none">
                {% placeholder 'hero' %}
            </div>
            <div class="mt-10 flex flex-wrap gap-4">
                <a href="/contact/" class="px-8 py-3.5 bg-white text-black shadow-md rounded hover:bg-gray-200 transition-colors flex items-center gap-2">
                    Contact Us <span class="font-mono">&rarr;</span>
                </a>
                <a href="/services/" class="px-8 py-3.5 border border-white/30 text-white hover:bg-white/10 rounded transition-colors shadow-sm backdrop-blur-sm">
                    Explore Services
                </a>
            </div>
        </div>
    </div>
</section>

<section class="py-24 bg-[#0a0a0a] text-white border-b border-white/10">
    <div class="container mx-auto px-6 max-w-7xl">
        {% placeholder 'content' %}
    </div>
</section>

<section class="py-24 bg-white dark:bg-[#0a0a0a] transition-colors duration-300">
    <div class="container mx-auto px-6 max-w-7xl">
        <div class="flex items-end justify-between gap-6 mb-10">
            <div>
                <div class="inline-block px-3 py-1 mb-4 border border-[#eaeaea] dark:border-white/10 rounded text-xs font-mono font-medium text-black dark:text-gray-200 uppercase tracking-widest bg-gray-50 dark:bg-white/5 shadow-sm">Service catalogue</div>
                <h2 class="text-4xl md:text-5xl font-heading font-bold tracking-tight text-black dark:text-white">Visual editing, dynamic services.</h2>
            </div>
            <a href="/services/" class="hidden md:inline-flex text-sm font-mono uppercase tracking-wider text-black dark:text-white border-b border-black dark:border-white pb-2">Open Services Page</a>
        </div>
        {% service_cards %}
    </div>
</section>
{% endblock %}
